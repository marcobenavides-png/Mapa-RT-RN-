<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Mapa Territorial RT — Intaco 2026</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');
:root{
  --bg:#0f1117;--s1:#181c26;--s2:#1e2330;--s3:#242838;
  --bd:rgba(255,255,255,0.07);--bd2:rgba(255,255,255,0.14);
  --tx:#e8eaf0;--mu:#6b7280;--mu2:#9ca3af;--ac:#3b82f6;
  --fn:'DM Sans',sans-serif;--fm:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--tx);font-family:var(--fn);}
.app{display:grid;grid-template-rows:50px 1fr;height:100vh;}

/* HEADER */
header{display:flex;align-items:center;gap:12px;padding:0 18px;background:var(--s1);border-bottom:1px solid var(--bd);z-index:20;}
.logo{font-size:13px;font-weight:600;color:#fff;letter-spacing:.3px;}.logo em{color:var(--ac);font-style:normal;}
.hbadge{font-size:10px;font-family:var(--fm);color:var(--mu);background:var(--s2);border:1px solid var(--bd);padding:3px 9px;border-radius:20px;}
.hright{margin-left:auto;display:flex;gap:8px;align-items:center;}

/* LAYOUT */
.main{display:grid;grid-template-columns:270px 1fr;overflow:hidden;}

/* SIDEBAR */
.sidebar{background:var(--s1);border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden;}
.sb-blk{padding:11px 14px;border-bottom:1px solid var(--bd);}
.sb-ttl{font-size:9px;font-weight:600;letter-spacing:1.2px;color:var(--mu);text-transform:uppercase;margin-bottom:8px;}
.rtabs{display:flex;background:var(--bg);border-radius:7px;padding:3px;gap:2px;}
.rtab{flex:1;padding:5px 3px;font-size:11px;font-weight:500;text-align:center;border:none;border-radius:5px;background:transparent;color:var(--mu);cursor:pointer;font-family:var(--fn);transition:all .14s;}
.rtab:hover{color:var(--tx);}.rtab.on{background:var(--s2);color:var(--tx);}
.rtab.on[data-r="vt"]{color:#60a5fa;}.rtab.on[data-r="art"]{color:#34d399;}
.pscroll{flex:1;overflow-y:auto;padding:5px 7px;}
.pscroll::-webkit-scrollbar{width:3px;}
.pscroll::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px;}
.pitem{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;cursor:pointer;transition:background .1s;margin-bottom:2px;}
.pitem:hover{background:var(--s2);}.pitem.on{background:rgba(59,130,246,0.1);outline:1px solid rgba(59,130,246,0.2);}
.pava{width:30px;height:30px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;}
.pinfo{flex:1;min-width:0;}.pname{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.prole{font-size:10px;color:var(--mu);margin-top:1px;}
.ppill{font-size:10px;font-family:var(--fm);padding:2px 6px;border-radius:8px;background:var(--s2);color:var(--mu);flex-shrink:0;}
.empty-p{padding:18px 10px;text-align:center;color:var(--mu);font-size:11px;line-height:1.8;}
.ipanel{padding:11px 14px;border-top:1px solid var(--bd);min-height:90px;font-size:12px;}
.ip-name{font-size:13px;font-weight:600;margin-bottom:5px;}
.ip-row{display:flex;justify-content:space-between;padding:2px 0;color:var(--mu);font-size:11px;}
.ip-val{color:var(--tx);font-weight:500;max-width:155px;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ip-empty{color:var(--mu);line-height:1.7;font-size:11px;}
.ip-parrs{margin-top:5px;font-size:10px;color:var(--mu);line-height:1.6;}

/* MAP AREA */
.maparea{display:flex;flex-direction:column;overflow:hidden;background:#070a0f;position:relative;}
.toolbar{display:flex;align-items:center;gap:6px;padding:7px 14px;background:var(--s1);border-bottom:1px solid var(--bd);flex-shrink:0;flex-wrap:wrap;}
.vtabs{display:flex;background:var(--bg);border-radius:6px;padding:2px;gap:2px;}
.vtab{padding:4px 10px;font-size:11px;border:none;border-radius:5px;background:transparent;color:var(--mu);cursor:pointer;font-family:var(--fn);transition:all .12s;}
.vtab.on{background:var(--s2);color:var(--tx);}
.legend{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
.leg{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--mu);}
.legdot{width:8px;height:8px;border-radius:50%;}
.hint{font-size:10px;color:var(--mu);border-left:1px solid var(--bd);padding-left:10px;}
.resetbtn{padding:4px 11px;font-size:11px;border:1px solid var(--bd);border-radius:6px;background:transparent;color:var(--mu);cursor:pointer;font-family:var(--fn);transition:all .12s;margin-left:auto;}
.resetbtn:hover{border-color:var(--ac);color:var(--ac);}
.mapwrap{flex:1;overflow:hidden;position:relative;cursor:grab;}.mapwrap:active{cursor:grabbing;}
#mapsvg{width:100%;height:100%;display:block;}

/* MAP PATHS */
.pp{stroke:#070a0f;stroke-width:0.8;cursor:pointer;transition:filter .1s,opacity .18s,stroke-width .1s;}
.pp:hover{stroke:#fff;stroke-width:2;filter:brightness(1.3);}
.pp.dimmed{opacity:0.06;}
.pp-cant{stroke:#070a0f;stroke-width:0.3;cursor:pointer;transition:filter .1s,opacity .18s;display:none;}
.pp-cant:hover{stroke:#fff;stroke-width:1;filter:brightness(1.3);}
.pp-cant.vis{display:block;}
.pp-zone{stroke:#070a0f;stroke-width:0.4;cursor:pointer;transition:filter .1s,opacity .18s;display:none;}
.pp-zone:hover{stroke:#fff;stroke-width:1.5;filter:brightness(1.3);}
.pp-zone.vis{display:block;}
.pp-zone.dimmed,.pp-cant.dimmed{opacity:0.06;}
.plbl{font-family:'DM Sans',sans-serif;fill:rgba(255,255,255,0.75);font-weight:600;text-anchor:middle;dominant-baseline:middle;pointer-events:none;}
.clbl{font-family:'DM Sans',sans-serif;fill:rgba(255,255,255,0.6);font-weight:500;text-anchor:middle;dominant-baseline:middle;pointer-events:none;display:none;}
.clbl.vis{display:block;}
.zlbl{font-family:'DM Sans',sans-serif;fill:rgba(255,255,255,0.7);font-weight:600;text-anchor:middle;dominant-baseline:middle;pointer-events:none;display:none;}
.zlbl.vis{display:block;}

/* TOOLTIP */
.tt{position:absolute;pointer-events:none;background:rgba(8,10,18,0.97);border:1px solid var(--bd2);border-radius:10px;padding:10px 13px;opacity:0;transition:opacity .1s;z-index:50;max-width:240px;box-shadow:0 8px 32px rgba(0,0,0,.6);}
.tt.show{opacity:1;}
.tt-name{font-size:13px;font-weight:600;color:#fff;margin-bottom:3px;}
.tt-badge{font-size:10px;font-family:var(--fm);padding:2px 8px;border-radius:8px;display:inline-block;margin-bottom:5px;}
.tt-row{font-size:11px;color:var(--mu);margin-top:3px;display:flex;justify-content:space-between;gap:8px;}
.tt-row b{font-weight:500;}
.tt-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:4px;vertical-align:middle;}

/* ZOOM CONTROLS */
.zbtns{position:absolute;bottom:16px;right:14px;display:flex;flex-direction:column;gap:3px;z-index:10;}
.zbtn{width:30px;height:30px;background:var(--s1);border:1px solid var(--bd2);border-radius:7px;color:var(--tx);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.zbtn:hover{background:var(--s2);}
.sbadge{position:absolute;bottom:16px;left:14px;font-size:9px;font-family:var(--fm);color:var(--mu);background:rgba(15,17,23,0.85);border:1px solid var(--bd);border-radius:6px;padding:4px 9px;}

/* ZOOM INDICATOR */
.zoom-in-msg{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(8,10,18,0.85);border:1px solid var(--bd2);border-radius:10px;padding:10px 18px;font-size:12px;color:var(--mu2);pointer-events:none;opacity:0;transition:opacity .3s;text-align:center;}
.zoom-in-msg.show{opacity:1;}
</style>
</head>
<body>
<div class="app">
<header>
  <div class="logo">INTACO <em>RT</em> · Mapa Territorial 2026</div>
  <span class="hbadge">CONALI + Municipio DMQ 2024</span>
  <div class="hright">
    <span class="hbadge" id="statbadge">Cargando...</span>
  </div>
</header>
<div class="main">
  <aside class="sidebar">
    <div class="sb-blk">
      <div class="sb-ttl">① Filtrar por rol</div>
      <div class="rtabs">
        <button class="rtab on" data-r="todos" onclick="setRol('todos',this)">Todos</button>
        <button class="rtab" data-r="vt" onclick="setRol('vt',this)">VT</button>
        <button class="rtab" data-r="art" onclick="setRol('art',this)">ART</button>
      </div>
    </div>
    <div class="sb-blk" style="padding-bottom:7px;"><div class="sb-ttl">② Seleccionar persona</div></div>
    <div class="pscroll" id="pList"></div>
    <div class="ipanel" id="iPanel"><div class="ip-empty">Pasa el cursor sobre el mapa o selecciona una persona.</div></div>
  </aside>
  <div class="maparea">
    <div class="toolbar">
      <div class="vtabs">
        <button class="vtab on" onclick="setView('prov',this)">Provincias</button>
        <button class="vtab" onclick="setView('cant',this)">Cantones</button>
        <button class="vtab" onclick="setView('zones',this)">Zonas Quito</button>
        <button class="vtab" onclick="setView('region',this)">Región</button>
      </div>
      <div class="legend" id="legend"></div>
      <span class="hint">Scroll = zoom · Arrastrar = mover</span>
      <button class="resetbtn" onclick="resetAll()">↺ Limpiar</button>
    </div>
    <div class="mapwrap" id="mapwrap">
      <svg id="mapsvg" viewBox="0 0 1000 1000" preserveAspectRatio="xMidYMid meet">
        <g id="gProv"></g>
        <g id="gCant"></g>
        <g id="gZone"></g>
        <g id="gLbl"></g>
      </svg>
      <div class="tt" id="tt"></div>
      <div class="zoom-in-msg" id="zoomMsg">Haz zoom sobre Quito para ver las zonas comerciales</div>
    </div>
    <div class="zbtns">
      <button class="zbtn" onclick="doZoom(1.25)">+</button>
      <button class="zbtn" onclick="doZoom(0.8)">−</button>
    </div>
    <div class="sbadge" id="sbadge">Provincias · CONALI 2024</div>
  </div>
</div>
</div>

// ── GEO PROJECTION ───────────────────────────────────────────────────────────
const LON_MIN=-81.2,LON_MAX=-74.9,LAT_MAX=1.65,LAT_MIN=-5.15,VW=1000,VH=1000;
function proj(lo,la){return[(lo-LON_MIN)/(LON_MAX-LON_MIN)*VW,(LAT_MAX-la)/(LAT_MAX-LAT_MIN)*VH];}
function gPath(geom){
  const r2d=c=>c.map(([lo,la])=>{const[x,y]=proj(lo,la);return x.toFixed(1)+','+y.toFixed(1);});
  const p=c=>'M'+c.map(r=>r2d(r).join('L')).join('M')+'Z';
  if(geom.type==='Polygon') return p(geom.coordinates);
  if(geom.type==='MultiPolygon') return geom.coordinates.map(p).join('');
  return'';
}
function cen(geom){
  const pts=[];
  const col=c=>c.forEach(r=>r.forEach(([lo,la])=>{const[x,y]=proj(lo,la);pts.push([x,y]);}));
  if(geom.type==='Polygon') col(geom.coordinates);
  if(geom.type==='MultiPolygon') geom.coordinates.forEach(col);
  if(!pts.length)return[500,500];
  return[pts.reduce((s,p)=>s+p[0],0)/pts.length,pts.reduce((s,p)=>s+p[1],0)/pts.length];
}

// ── NAME MATCHING ────────────────────────────────────────────────────────────
function norm(s){
  return s.trim().toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/\s+/g,' ');
}
const provKeys=Object.keys(PROV_DATA);
function matchProv(name){
  const n=norm(name);
  for(const k of provKeys){
    if(norm(k)===n||n.includes(norm(k))||norm(k).includes(n)) return k;
  }
  return null;
}

      const n=name.trim();
      if(!personIdx[n]) personIdx[n]={rol,color,provinces:[],initials:n.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()};
      if(!personIdx[n].provinces.includes(prov)) personIdx[n].provinces.push(prov);
    };
    d.vt.forEach(n=>add(n,'vt',VT_COL[n]||'#3b82f6'));
    d.art.forEach(n=>add(n,'art',ART_COL[n]||'#34d399'));
  });
}

// ── STATE ────────────────────────────────────────────────────────────────────
let rol='todos', selPerson=null, view='prov';
let scl=1,tx=0,ty=0,drag=false,dp=null;
const NS='http://www.w3.org/2000/svg';

// ── COLOR LOGIC ───────────────────────────────────────────────────────────────
function getProvColor(key){
  const d=PROV_DATA[key];if(!d)return null;
  if(view==='region') return REG_COL[d.region]||'#1e2a3a';
  if(selPerson){
    const pi=personIdx[selPerson];
    return pi&&pi.provinces.includes(key)?pi.color:null;
  }
  const people=rol==='todos'?[...d.vt,...d.art]:rol==='vt'?d.vt:d.art;
  if(!people.length)return null;
  const n=people[0].trim();
  return rol==='art'?(ART_COL[n]||'#34d399'):(VT_COL[n]||'#3b82f6');
}

function getZoneColor(zona){
  if(view==='region') return REG_COL['Region Norte']||'#1d4ed8';
  if(selPerson){
    const pi=personIdx[selPerson];
    // Check if this person covers Pichincha
    return pi&&pi.provinces.includes('Pichincha')?pi.color:null;
  }
  return ZONE_COL[zona]||'#1e2a3a';
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function render(){
  const gP=document.getElementById('gProv');
  const gC=document.getElementById('gCant');
  const gZ=document.getElementById('gZone');
  const gL=document.getElementById('gLbl');
  gP.innerHTML='';gC.innerHTML='';gZ.innerHTML='';gL.innerHTML='';

  const showCant  = view==='cant';
  const showZones = view==='zones';

  // ── PROVINCES — render unassigned first, assigned on top ──
  const sortedProvFeatures = [...PROV_GEO.features].sort((a,b)=>{
    const ka=matchProv(a.properties.nombre), kb=matchProv(b.properties.nombre);
    const ca=ka?getProvColor(ka):null, cb=kb?getProvColor(kb):null;
    // unassigned (null color) goes first so assigned provinces paint over them
    if(!ca && cb) return -1;
    if(ca && !cb) return 1;
    return 0;
  });
  sortedProvFeatures.forEach(f=>{
    const key=matchProv(f.properties.nombre);
    const color=key?getProvColor(key):null;
    const dimmed=selPerson&&key&&!personIdx[selPerson]?.provinces.includes(key);
    const d=gPath(f.geometry);if(!d)return;
    const el=document.createElementNS(NS,'path');
    el.setAttribute('d',d);
    el.setAttribute('fill',color||'#1e2a3a');
    el.setAttribute('class','pp'+(dimmed?' dimmed':''));
    el.dataset.key=key||'';
    el.addEventListener('mouseenter',e=>showTT(e,'prov',f.properties.nombre,null,key));
    el.addEventListener('mouseleave',hideTT);
    el.addEventListener('mousemove',moveTT);
    gP.appendChild(el);

    if(!showCant&&!showZones){
      const[cx,cy]=cen(f.geometry);
      const lbl=document.createElementNS(NS,'text');
      lbl.setAttribute('x',cx.toFixed(1));lbl.setAttribute('y',cy.toFixed(1));
      lbl.setAttribute('class','plbl');
      lbl.style.fontSize='7.5px';
      lbl.style.opacity=dimmed?'0.1':'1';
      const short=f.properties.nombre.length>14?f.properties.nombre.split(' ')[0]:f.properties.nombre;
      lbl.textContent=short;
      gL.appendChild(lbl);
    }
  });

  // ── CANTONS ──
  CANT_GEO.features.forEach(f=>{
    const key=matchProv(f.properties.nombre_prov);
    const color=key?getProvColor(key):null;
    const dimmed=selPerson&&key&&!personIdx[selPerson]?.provinces.includes(key);
    const d=gPath(f.geometry);if(!d)return;
    const el=document.createElementNS(NS,'path');
    el.setAttribute('d',d);
    el.setAttribute('fill',color||'#1e2a3a');
    el.setAttribute('class','pp-cant'+(dimmed?' dimmed':'')+(showCant?' vis':''));
    el.addEventListener('mouseenter',e=>showTT(e,'cant',f.properties.nombre_canton,f.properties.nombre_prov,key));
    el.addEventListener('mouseleave',hideTT);
    el.addEventListener('mousemove',moveTT);
    gC.appendChild(el);

    if(showCant){
      const[cx,cy]=cen(f.geometry);
      const lbl=document.createElementNS(NS,'text');
      lbl.setAttribute('x',cx.toFixed(1));lbl.setAttribute('y',cy.toFixed(1));
      lbl.setAttribute('class','clbl vis');
      lbl.style.fontSize='5px';
      lbl.style.opacity=dimmed?'0.08':'1';
      lbl.textContent=f.properties.nombre_canton;
      gL.appendChild(lbl);
    }
  });

  // ── QUITO ZONES ──
  QUITO_GEO.features.forEach(f=>{
    const p=f.properties;
    const zona=p.zona||'Sin zona';
    const color=showZones?getZoneColor(zona):(getProvColor('Pichincha')||'#1e2a3a');
    const dimmed=selPerson&&!personIdx[selPerson]?.provinces.includes('Pichincha');
    const d=gPath(f.geometry);if(!d)return;
    const el=document.createElementNS(NS,'path');
    el.setAttribute('d',d);
    el.setAttribute('fill',color||'#1e2a3a');
    el.setAttribute('class','pp-zone'+(dimmed?' dimmed':'')+(showZones?' vis':''));
    el.addEventListener('mouseenter',e=>showTT(e,'zone',p.nombre,zona,null,p));
    el.addEventListener('mouseleave',hideTT);
    el.addEventListener('mousemove',moveTT);
    gZ.appendChild(el);

    if(showZones){
      const[cx,cy]=cen(f.geometry);
      const lbl=document.createElementNS(NS,'text');
      lbl.setAttribute('x',cx.toFixed(1));lbl.setAttribute('y',cy.toFixed(1));
      lbl.setAttribute('class','zlbl vis');
      const isUrban=p.source==='municipal';
      lbl.style.fontSize=isUrban?'1.8px':'2.8px';
      lbl.style.fontWeight='500';
      if(isUrban) lbl.classList.add('urban-lbl');
      lbl.style.fill=ZONE_TXT[zona]||'rgba(255,255,255,0.75)';
      lbl.style.opacity=dimmed?'0.05':'0.9';
      lbl.textContent=p.nombre;
      gL.appendChild(lbl);
    }
  });

  renderPersonList();
  renderLegend();
  updateBadge();
}

// ── TOOLTIP ──────────────────────────────────────────────────────────────────
function showTT(e,type,name,sub,provKey,zoneProps){
  const tt=document.getElementById('tt');
  let html='';

  if(type==='zone'&&zoneProps){
    const zona=sub||'Sin zona';
    const vtColor=VT_COL[zoneProps.vt]||'#3b82f6';
    const artColor=ART_COL[zoneProps.art]||'#34d399';
    html=`<div class="tt-name">${name}</div>
      <div class="tt-badge" style="background:${ZONE_COL[zona]||'#333'}55;color:${ZONE_TXT[zona]||'#fff'};border:1px solid ${ZONE_COL[zona]||'#333'}88">${zona}</div>
      <div class="tt-row"><span>VT</span><b><span class="tt-dot" style="background:${vtColor}"></span>${zoneProps.vt||'—'}</b></div>
      <div class="tt-row"><span>ART</span><b><span class="tt-dot" style="background:${artColor}"></span>${zoneProps.art||'—'}</b></div>`;
    // update info panel
    document.getElementById('iPanel').innerHTML=`
      <div class="ip-name" style="color:${ZONE_TXT[zona]||'#fff'}">${name}</div>
      <div class="ip-row"><span>Zona</span><span class="ip-val">${zona}</span></div>
      <div class="ip-row"><span>VT</span><span class="ip-val" style="color:${vtColor}">${zoneProps.vt||'—'}</span></div>
      <div class="ip-row"><span>ART</span><span class="ip-val" style="color:${artColor}">${zoneProps.art||'—'}</span></div>`;
  } else {
    const d=provKey?PROV_DATA[provKey]:null;
    const region=d?.region||'';
    const rbg=region.includes('Norte')?'rgba(29,78,216,0.25)':region.includes('Sur')?'rgba(124,58,237,0.25)':'rgba(255,255,255,0.05)';
    html=`<div class="tt-name">${name}</div>`;
    if(sub) html+=`<div style="font-size:10px;color:var(--mu);margin-bottom:3px">${sub}</div>`;
    if(region) html+=`<div class="tt-badge" style="background:${rbg};color:#e8eaf0">${region}</div>`;
    if(d){
      if(d.vt.length) d.vt.forEach(n=>{
        html+=`<div class="tt-row"><span>VT</span><b><span class="tt-dot" style="background:${VT_COL[n]||'#3b82f6'}"></span>${n}</b></div>`;
      });
      else html+=`<div class="tt-row" style="color:var(--mu)">VT: pendiente</div>`;
      if(d.art.length) d.art.forEach(n=>{
        html+=`<div class="tt-row"><span>ART</span><b><span class="tt-dot" style="background:${ART_COL[n]||'#34d399'}"></span>${n}</b></div>`;
      });
      else html+=`<div class="tt-row" style="color:var(--mu)">ART: pendiente</div>`;
      if(d.jef) html+=`<div class="tt-row"><span>Jefatura</span><b>${d.jef}</b></div>`;
    }
    // update info panel
    if(d){
      document.getElementById('iPanel').innerHTML=`
        <div class="ip-name">${name}${sub?` <span style="font-size:10px;font-weight:400;color:var(--mu)">(${sub})</span>`:''}</div>
        <div class="ip-row"><span>Región</span><span class="ip-val">${d.region||'—'}</span></div>
        <div class="ip-row"><span>VT</span><span class="ip-val">${d.vt.join(', ')||'Pendiente'}</span></div>
        <div class="ip-row"><span>ART</span><span class="ip-val">${d.art.join(', ')||'Pendiente'}</span></div>
        ${d.jef?`<div class="ip-row"><span>Jefatura</span><span class="ip-val">${d.jef}</span></div>`:''}`;
    }
  }
  tt.innerHTML=html;tt.classList.add('show');moveTT(e);
}
function moveTT(e){
  const tt=document.getElementById('tt'),w=document.getElementById('mapwrap');
  const r=w.getBoundingClientRect();
  let x=e.clientX-r.left+14,y=e.clientY-r.top+14;
  if(x+245>r.width)x-=255;if(y+170>r.height)y-=180;
  tt.style.left=x+'px';tt.style.top=y+'px';
}
function hideTT(){document.getElementById('tt').classList.remove('show');}

// ── PERSON LIST ───────────────────────────────────────────────────────────────
function renderPersonList(){
  const list=document.getElementById('pList');list.innerHTML='';
  const rl={vt:'Vendedor Técnico',art:'Asesor RT'};
  const entries=Object.entries(personIdx)
    .filter(([,pi])=>rol==='todos'||pi.rol===rol)
    .sort((a,b)=>a[0].localeCompare(b[0]));
  if(!entries.length){
    list.innerHTML=`<div class="empty-p">Sin personas para este filtro.</div>`;return;
  }
  entries.forEach(([name,pi])=>{
    const div=document.createElement('div');
    div.className='pitem'+(selPerson===name?' on':'');
    div.innerHTML=`<div class="pava" style="background:${pi.color}18;border:1.5px solid ${pi.color}40"><span style="color:${pi.color}">${pi.initials}</span></div>
      <div class="pinfo"><div class="pname">${name}</div><div class="prole">${rl[pi.rol]}</div></div>
      <span class="ppill">${pi.provinces.length}p</span>`;
    div.onclick=()=>pickPerson(name);
    list.appendChild(div);
  });
}

// ── LEGEND ────────────────────────────────────────────────────────────────────
function renderLegend(){
  const lg=document.getElementById('legend');lg.innerHTML='';
  if(view==='region'){
    Object.entries(REG_COL).forEach(([r,c])=>{lg.innerHTML+=`<span class="leg"><span class="legdot" style="background:${c}"></span>${r}</span>`;});
    lg.innerHTML+=`<span class="leg"><span class="legdot" style="background:#1e2a3a"></span>Sin asignar</span>`;
    return;
  }
  if(selPerson&&personIdx[selPerson]){
    const pi=personIdx[selPerson];
    lg.innerHTML+=`<span class="leg"><span class="legdot" style="background:${pi.color}"></span>${selPerson}</span>`;
    lg.innerHTML+=`<span class="leg"><span class="legdot" style="background:#1e2a3a"></span>Otras</span>`;
    return;
  }
  if(view==='zones'){
    lg.innerHTML=`<span class="leg" style="color:var(--mu2);font-size:10px">12 zonas · Quito</span>`;
    return;
  }
  const assigned=provKeys.filter(k=>{const d=PROV_DATA[k];return(rol==='todos'?[...d.vt,...d.art]:rol==='vt'?d.vt:d.art).length;}).length;
  lg.innerHTML+=`<span class="leg"><span class="legdot" style="background:#1e2a3a"></span>Sin asignar (${provKeys.length-assigned})</span>`;
  if(rol==='todos'||rol==='vt') Object.entries(VT_COL).forEach(([n,c])=>{lg.innerHTML+=`<span class="leg"><span class="legdot" style="background:${c}"></span>${n.split(' ')[0]}</span>`;});
  if(rol==='todos'||rol==='art') Object.entries(ART_COL).forEach(([n,c])=>{lg.innerHTML+=`<span class="leg"><span class="legdot" style="background:${c}"></span>${n.split(' ')[0]}</span>`;});
}

function updateBadge(){
  const assigned=provKeys.filter(k=>PROV_DATA[k].vt.length||PROV_DATA[k].art.length).length;
  document.getElementById('statbadge').textContent=`${provKeys.length} provincias · ${assigned} asignadas`;
  const labels={'prov':'Provincias · CONALI 2024','cant':'Cantones · CONALI 2024','zones':'Zonas Quito · Municipio DMQ 2024','region':'Regiones Intaco 2026'};
  document.getElementById('sbadge').textContent=labels[view]||'';
}

// ── CONTROLS ─────────────────────────────────────────────────────────────────
function setRol(r,btn){
  rol=r;selPerson=null;
  document.querySelectorAll('.rtab').forEach(b=>b.classList.toggle('on',b===btn));
  render();
}
function pickPerson(name){
  selPerson=selPerson===name?null:name;render();
  if(selPerson){
    const pi=personIdx[selPerson];
    const rl={vt:'Vendedor Técnico',art:'Asesor RT'};
    document.getElementById('iPanel').innerHTML=`
      <div class="ip-name">${selPerson}</div>
      <div class="ip-row"><span>Rol</span><span class="ip-val">${rl[pi.rol]}</span></div>
      <div class="ip-row"><span>Provincias</span><span class="ip-val">${pi.provinces.length}</span></div>
      <div class="ip-parrs">${pi.provinces.join(' · ')}</div>`;
  }
}
function setView(v,btn){
  view=v;
  document.querySelectorAll('.vtab').forEach(b=>b.classList.toggle('on',b===btn));
  render();
}
function resetAll(){
  selPerson=null;rol='todos';view='prov';
  scl=1;tx=0;ty=0;applyT();
  document.querySelectorAll('.rtab').forEach(b=>b.classList.toggle('on',b.dataset.r==='todos'));
  document.querySelectorAll('.vtab').forEach((b,i)=>b.classList.toggle('on',i===0));
  document.getElementById('iPanel').innerHTML='<div class="ip-empty">Pasa el cursor sobre el mapa o selecciona una persona.</div>';
  render();
}

// ── PAN & ZOOM ────────────────────────────────────────────────────────────────
function applyT(){
  const s=document.getElementById('mapsvg');
  s.style.transform=`translate(${tx}px,${ty}px) scale(${scl})`;
  s.style.transformOrigin='center center';
  // Show urban labels only when zoomed in enough (scale > 5)
  const showUrban = scl > 5;
  document.querySelectorAll('.urban-lbl').forEach(el=>{
    el.style.display = showUrban ? '' : 'none';
  });
}
function doZoom(f){scl=Math.min(16,Math.max(0.4,scl*f));applyT();}
const wrap=document.getElementById('mapwrap');
wrap.addEventListener('wheel',e=>{e.preventDefault();doZoom(e.deltaY<0?1.1:0.9);},{passive:false});
wrap.addEventListener('mousedown',e=>{drag=true;dp={x:e.clientX-tx,y:e.clientY-ty};});
window.addEventListener('mousemove',e=>{if(!drag)return;tx=e.clientX-dp.x;ty=e.clientY-dp.y;applyT();});
window.addEventListener('mouseup',()=>drag=false);
wrap.addEventListener('touchstart',e=>{if(e.touches.length===1){drag=true;dp={x:e.touches[0].clientX-tx,y:e.touches[0].clientY-ty};}},{passive:true});
wrap.addEventListener('touchmove',e=>{if(drag&&e.touches.length===1){tx=e.touches[0].clientX-dp.x;ty=e.touches[0].clientY-dp.y;applyT();}},{passive:true});
wrap.addEventListener('touchend',()=>drag=false);

// ── INIT ──────────────────────────────────────────────────────────────────────
buildIdx();
render();
</script>
</body>
</html>
